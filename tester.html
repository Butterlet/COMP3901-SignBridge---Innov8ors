
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL Detection System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --accent: #00ffcc;
    --accent2: #ff6b6b;
    --text: #e8ecf0;
    --muted: #5a6070;
    --border: #2a3040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(0,255,204,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 80%, rgba(255,107,107,0.04) 0%, transparent 60%);
  }

  .main-container {
    width: 100%;
    max-width: 1300px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
  }

  .left-panel {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    border: 1px solid var(--border);
  }

  .panel-title {
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .camera-box {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  #cameraFeed {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #cameraFeed canvas {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  .camera-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    z-index: 1;
  }

  .camera-placeholder svg { opacity: 0.3; }

  .letter-overlay {
    position: absolute;
    bottom: 16px;
    left: 16px;
    pointer-events: none;
    z-index: 2;
  }

  .hold-ring-wrap {
    position: relative;
    width: 100px;
    height: 100px;
  }

  .hold-ring-wrap svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }

  #detectedLetter {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    font-weight: 800;
    color: rgba(255,255,255,0.3);
    font-family: 'Syne', sans-serif;
    text-shadow: 0 0 20px rgba(0,255,204,0.5);
    transition: color 0.2s ease;
  }

  #detectedLetter.flash { animation: flash 0.4s ease; }

  @keyframes flash {
    0%   { transform: scale(1.3); color: #fff; }
    100% { transform: scale(1);   color: #00ffcc; }
  }

  .confidence-row { display: flex; align-items: center; gap: 10px; }

  .conf-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 80px;
    flex-shrink: 0;
  }

  .conf-track {
    flex: 1; height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  #confidenceBar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #00ffcc, #00c9a7);
    border-radius: 99px;
    transition: width 0.15s ease;
  }

  #confidenceValue {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    width: 36px;
    text-align: right;
  }

  .output-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px 18px;
    border: 1px solid var(--border);
  }

  #outputText {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .controls { display: flex; gap: 12px; }

  .btn {
    flex: 1; padding: 13px 20px; border: none;
    border-radius: 8px; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all 0.2s ease; letter-spacing: 0.04em;
  }

  #startBtn { background: var(--accent); color: #0d0f14; }
  #startBtn:hover:not(:disabled) { background: #00e6b8; transform: translateY(-1px); }
  #stopBtn { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  #stopBtn:hover:not(:disabled) { background: rgba(255,107,107,0.1); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .right-panel { display: flex; flex-direction: column; gap: 20px; }

  .word-card {
    background: var(--surface); border-radius: 16px;
    padding: 24px; border: 1px solid var(--border);
  }

  .word-display {
    font-size: 36px; font-weight: 800; color: var(--text);
    letter-spacing: 0.08em; min-height: 52px;
    margin: 12px 0 16px; word-break: break-all;
  }

  .word-hint {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--muted); margin-bottom: 16px; line-height: 1.6;
  }

  .word-controls { display: flex; gap: 10px; }

  .word-btn {
    flex: 1; padding: 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }

  .word-btn:hover { background: var(--border); }
  #clearWordBtn { color: var(--accent2); border-color: var(--accent2); }
  #clearWordBtn:hover { background: rgba(255,107,107,0.1); }

  .asl-card {
    background: var(--surface); border-radius: 16px;
    padding: 24px; border: 1px solid var(--border);
    flex: 1; display: flex; flex-direction: column; min-height: 0;
  }

  .asl-card img {
    width: 100%; flex: 1; object-fit: contain;
    border-radius: 8px; min-height: 0; margin-top: 12px;
  }

  #holdRing {
    stroke: var(--accent); stroke-width: 4; fill: none;
    stroke-linecap: round; stroke-dasharray: 283;
    stroke-dashoffset: 283; transition: stroke-dashoffset 0.1s linear;
  }

  .ring-bg { stroke: rgba(255,255,255,0.08); stroke-width: 4; fill: none; }
</style>
</head>

<body>
<div class="main-container">

  <div class="left-panel">
    <div class="panel-title">ASL Detection System</div>

    <div class="camera-box">
      <div id="cameraFeed"></div>

      <div class="camera-placeholder" id="cameraPlaceholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
        <span>Camera feed will appear here</span>
      </div>

      <div class="letter-overlay">
        <div class="hold-ring-wrap">
          <svg viewBox="0 0 100 100" width="100" height="100">
            <circle class="ring-bg" cx="50" cy="50" r="45"/>
            <circle id="holdRing" cx="50" cy="50" r="45"/>
          </svg>
          <div id="detectedLetter">?</div>
        </div>
      </div>
    </div>

    <div class="confidence-row">
      <span class="conf-label">Confidence</span>
      <div class="conf-track"><div id="confidenceBar"></div></div>
      <span id="confidenceValue">0%</span>
    </div>

    <div class="output-box">
      <div id="outputText">Waiting for model to load...</div>
    </div>

    <div class="controls">
      <button class="btn" id="startBtn">▶ Start</button>
      <button class="btn" id="stopBtn" disabled>■ Stop</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="word-card">
      <div class="panel-title">Word Builder</div>
      <div class="word-display" id="wordDisplay">—</div>
      <div class="word-hint">Hold a letter steady for ~1 second to add it to your word.</div>
      <div class="word-controls">
        <button class="word-btn" id="backspaceBtn">⌫ Backspace</button>
        <button class="word-btn" id="clearWordBtn">✕ Clear</button>
      </div>
    </div>

    <div class="asl-card">
      <div class="panel-title">ASL Alphabet Reference</div>
      <img src="ASL-Alphabet-poster-flashcards.png" alt="ASL Alphabet">
    </div>
  </div>

</div>

<!--
  Teachable Machine Pose requires ALL THREE scripts in this exact order:
  1. TF.js 1.3.1  (the version tmPose 0.8 was built against)
  2. PoseNet      (the underlying pose model)
  3. tmPose       (the Teachable Machine wrapper)
-->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.6/dist/teachablemachine-pose.min.js"></script>
<script src="tester.js"></script>
</body>
</html>
